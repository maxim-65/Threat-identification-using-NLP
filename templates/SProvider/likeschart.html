{% extends 'SProvider/Header.html' %}
{% block researchblock %}

<style>
     .chart-actions {
          display: flex;
          flex-wrap: wrap;
          gap: 10px;
          margin-bottom: 14px;
     }

     .chart-actions button {
          border: 0;
          border-radius: 999px;
          padding: 10px 16px;
          color: #ffffff;
          background: linear-gradient(135deg, #0b6e6e, #1fb6cf);
          font: inherit;
          font-weight: 700;
          cursor: pointer;
          transition: transform 0.2s ease, filter 0.2s ease;
     }

     .chart-actions button.active {
          background: linear-gradient(135deg, #f59e0b, #ef476f);
     }

     .chart-actions button:hover {
          transform: translateY(-1px);
          filter: brightness(1.05);
     }

     .graph-card {
          background: rgba(255, 255, 255, 0.9);
          border-radius: 12px;
          padding: 14px;
     }

     #chartContainer {
          width: 100%;
          height: 520px;
          position: relative;
     }

     @media (max-width: 900px) {
          #chartContainer {
               height: 380px;
          }
     }
</style>


<script>
window.onload = function() {

var chart = new CanvasJS.Chart("chartContainer", {
	animationEnabled: true,
	title: {
		text: ""
	},
	data: [{
	{% if chart_type == "rangeSplineArea" %}
		type: "rangeSplineArea",
	{% elif chart_type == "pie" %}
		type: "pie",
	{% elif chart_type == "spline" %}
		type: "spline",
	{% endif %}
		startAngle: 240,
		yValueFormatString: "##0.00\"%\"",
		indexLabel: "{label} {y}",
		dataPoints: [
		{% for o in form %}
			{y: {{o.dcount}}, label: "{{o.names}}"},
		{% endfor %}
		]
	}]
});
chart.render();

}

</script>
<div class="chart-actions">
     <button type="button" class="active" onclick="window.location.href='{% url 'likeschart' 'bar' %}'">Bar Chart</button>
</div>
<div class="chart-layout">
     <div class="graph-card">
          <div id="chartContainer" class="graph"></div>
     </div>
</div>
<script src="https://canvasjs.com/assets/script/canvasjs.min.js"></script>
{% endblock %}
