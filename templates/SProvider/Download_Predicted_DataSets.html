{% extends 'SProvider/Header.html' %}
{% block researchblock %}

<style>
	.download-wrap {
		background: #ffffff;
		border-radius: 14px;
		padding: 22px;
		border: 1px solid #e2e8f0;
		box-shadow: 0 10px 24px rgba(0, 0, 0, 0.14);
		text-align: center;
	}

	.download-title {
		margin: 0 0 8px;
		font-size: 1.14rem;
		font-weight: 800;
		color: #0b6e6e;
	}

	.download-text {
		margin: 0 0 16px;
		color: #334155;
		font-size: 0.92rem;
	}

	.download-btn {
		display: inline-block;
		text-decoration: none;
		color: #ffffff;
		font-weight: 700;
		font-size: 0.86rem;
		border-radius: 999px;
		padding: 10px 16px;
		background: linear-gradient(135deg, #0b6e6e, #1fb6cf);
		transition: transform 0.2s ease, filter 0.2s ease;
	}

	.download-btn:hover {
		transform: translateY(-1px);
		filter: brightness(1.06);
	}
</style>

<div class="download-wrap">
	<h2 class="download-title">Download Predicted Data Sets</h2>
	<p class="download-text">Export all prediction records as an Excel file for external analysis.</p>
	<a class="download-btn" href="{% url 'Download_Predicted_DataSets' %}">Download Predicted_Datasets.xls</a>
</div>

{% endblock %}
