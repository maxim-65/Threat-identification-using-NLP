{% extends 'SProvider/Header.html' %}
{% block researchblock %}

<style>
     .chart-layout {
          display: grid;
          grid-template-columns: 220px 1fr;
          gap: 16px;
          align-items: start;
     }

     .sidemenu {
          background: rgba(255, 255, 255, 0.9);
          border-radius: 12px;
          padding: 14px;
          position: sticky;
          top: 12px;
     }

     .sidemenu a {
          display: block;
          margin-bottom: 10px;
          color: #0f172a;
          font-weight: 700;
          text-decoration: none;
     }

     .graph-card {
          background: rgba(255, 255, 255, 0.95);
          border-radius: 12px;
          padding: 14px;
     }

     #chartContainer {
          width: 100%;
          height: 520px;
          position: relative;
     }

     @media (max-width: 900px) {
          .chart-layout {
               grid-template-columns: 1fr;
          }

          .sidemenu {
               position: relative;
               top: 0;
          }

          #chartContainer {
               height: 380px;
          }
     }
</style>


<script>
window.onload = function() {

var chart = new CanvasJS.Chart("chartContainer", {
	animationEnabled: true,
	title: {
		text: ""
	},
	data: [{
	{% if dislike_chart == "bar" %}
		type: "bar",
	{% elif dislike_chart == "pie" %}
		type: "pie",
	{% elif dislike_chart == "spline" %}
		type: "spline",
	{% endif %}
		startAngle: 240,
		yValueFormatString: "##0.00\"%\"",
		indexLabel: "{label} {y}",
		dataPoints: [
		{% for o in form %}
			{y: {{o.dcount}}, label: "{{o.names}}"},
		{% endfor %}
		]
	}]
});
chart.render();

}

</script>
<div class="chart-layout">
     <div class="sidemenu">
          <a href="{% url 'dislikeschart' 'pie' %}">Pie Chart</a>
          <a href="{% url 'dislikeschart' 'bar' %}">Bar Chart</a>
     </div>
     <div class="graph-card">
          <div id="chartContainer" class="graph"></div>
     </div>
</div>
<script src="https://canvasjs.com/assets/script/canvasjs.min.js"></script>
{% endblock %}
