<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Remote User</title>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --c1: #0b6e6e;
      --c2: #1fb6cf;
      --c3: #f59e0b;
      --c4: #ef476f;
      --panel: rgba(255, 255, 255, 0.9);
      --ink: #1f2937;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      color: var(--ink);
      background: linear-gradient(135deg, rgba(11, 110, 110, 0.82), rgba(31, 182, 207, 0.7)),
            url("{% static 'bg.jpg' %}") center/cover fixed no-repeat;
    }

    .page-shell {
      max-width: 1200px;
      margin: 24px auto;
      border-radius: 18px;
      overflow: hidden;
      background: var(--panel);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
    }

    .hero {
      display: grid;
      grid-template-columns: 120px 1fr 120px;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      background: linear-gradient(90deg, var(--c1), var(--c2), var(--c3));
    }

    .hero h1 {
      margin: 0;
      color: #fff;
      font-size: 1.25rem;
      line-height: 1.35;
      text-align: center;
      font-weight: 800;
    }

    .hero img {
      width: 100%;
      max-width: 110px;
      height: 70px;
      object-fit: cover;
      border-radius: 10px;
      border: 2px solid rgba(255, 255, 255, 0.65);
    }

    .nav-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      padding: 14px;
      background: #ffffff;
      border-bottom: 4px solid var(--c4);
    }

    .nav-row a {
      text-decoration: none;
      color: #fff;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 10px 14px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--c1), var(--c2));
      transition: transform 0.2s ease, filter 0.2s ease, box-shadow 0.2s ease;
    }

    .nav-row a.active {
      background: linear-gradient(135deg, var(--c3), var(--c4));
    }

    .nav-row a:hover {
      transform: translateY(-2px) scale(1.01);
      filter: brightness(1.08);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
    }

    .nav-row a:active {
      transform: translateY(0);
      filter: brightness(0.98);
    }

    .mainholder {
      padding: 20px;
    }

    @media (max-width: 768px) {
      .page-shell {
        margin: 8px;
        border-radius: 12px;
      }

      .hero {
        grid-template-columns: 1fr;
      }

      .hero img {
        display: none;
      }

      .hero h1 {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
<div class="page-shell">
  <div class="hero">
    <img src="{% static 'img1.jpg' %}" alt="Cyber Visual Left" />
    <h1>Automated Emerging Cyber Threat Identification and Profiling Based on Natural Language Processing</h1>
    <img src="{% static 'banner.jpg' %}" alt="Cyber Visual Right" />
    </div>
  <div class="nav-row">
    <a href="{% url 'Predict_Cyber_Threat_Identification_Type' %}" class="{% if request.path == '/Predict_Cyber_Threat_Identification_Type/' %}active{% endif %}">Predict Threat Type</a>
    <a href="{% url 'ViewYourProfile' %}" class="{% if request.path == '/ViewYourProfile/' %}active{% endif %}">View Profile</a>
    <a href="{% url 'index' %}">Logout</a>
  </div>

<div class="mainholder">
{% block userblock %}
{% endblock %}
</div>
</div>
</body>
</html>
