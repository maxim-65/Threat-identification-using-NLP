services:
  - type: web
    name: threat-identification-using-nlp
    env: python
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn config.wsgi:application
    rootDir: cyber_threat_app
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "threat-identification-using-nlp.onrender.com,localhost"
